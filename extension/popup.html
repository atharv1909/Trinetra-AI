<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F0F0F;
      color: #F5F5F5;
    }

    .header {
      padding: 16px;
      background: #1A1A1A;
      border-bottom: 1px solid #2A2A2A;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-title { font-size: 15px; font-weight: 600; }
    .header-sub   { font-size: 11px; color: #888; margin-top: 2px; }
    .eye-icon     { font-size: 22px; }

    .score-section {
      padding: 20px 16px;
      text-align: center;
    }
    .score-circle {
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto 12px;
      border: 3px solid;
    }
    .score-num  { font-size: 22px; font-weight: 700; }
    .score-pct  { font-size: 10px; color: #888; }
    .risk-label { font-size: 13px; font-weight: 600; letter-spacing: 1px; }

    .HIGH   { border-color: #DC2626; color: #DC2626; }
    .MEDIUM { border-color: #D97706; color: #D97706; }
    .LOW    { border-color: #2563EB; color: #2563EB; }
    .SAFE   { border-color: #16A34A; color: #16A34A; }

    .url-box {
      padding: 0 16px 12px;
      font-size: 11px;
      color: #666;
      word-break: break-all;
      text-align: center;
    }

    .flags {
      padding: 0 16px 16px;
    }
    .flags-title {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .flag {
      background: #1E1E1E;
      border: 1px solid #2A2A2A;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      margin-bottom: 4px;
      color: #CCC;
    }
    .flag.danger { border-color: #7F1D1D; color: #FCA5A5; }
    .flag.warn   { border-color: #78350F; color: #FCD34D; }

    .eyes {
      padding: 0 16px 16px;
      display: flex;
      gap: 8px;
    }
    .eye-card {
      flex: 1;
      background: #1A1A1A;
      border: 1px solid #2A2A2A;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .eye-name  { font-size: 10px; color: #666; margin-bottom: 4px; }
    .eye-score { font-size: 14px; font-weight: 600; }

    .loading {
      padding: 40px 16px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }

    .no-backend {
      padding: 20px 16px;
      text-align: center;
      color: #666;
      font-size: 12px;
      line-height: 1.6;
    }

    .open-btn {
      display: block;
      margin: 0 16px 16px;
      padding: 8px;
      background: #1D4ED8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    .open-btn:hover { background: #2563EB; }
  </style>
</head>
<body>

<div class="header">
  <span class="eye-icon">👁</span>
  <div>
    <div class="header-title">Trinetra AI</div>
    <div class="header-sub">Phishing Detection System</div>
  </div>
</div>

<div id="content">
  <div class="loading">Scanning...</div>
</div>

<script src="popup.js"></script>
</body>
</html>
